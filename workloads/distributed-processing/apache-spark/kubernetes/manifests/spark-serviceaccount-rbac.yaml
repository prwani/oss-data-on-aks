apiVersion: v1
kind: ServiceAccount
metadata:
  name: spark
  namespace: spark
  labels:
    app.kubernetes.io/name: apache-spark
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: spark-workload
  namespace: spark
  labels:
    app.kubernetes.io/name: apache-spark
rules:
  - apiGroups:
      - ""
    resources:
      - pods
      - services
      - configmaps
      - persistentvolumeclaims
    verbs:
      - "*"
  - apiGroups:
      - apps
    resources:
      - statefulsets
    verbs:
      - "*"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: spark-workload
  namespace: spark
  labels:
    app.kubernetes.io/name: apache-spark
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: spark-workload
subjects:
  - kind: ServiceAccount
    name: spark
    namespace: spark
