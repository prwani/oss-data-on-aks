apiVersion: v1
kind: ServiceAccount
metadata:
  name: flink
  namespace: flink
  labels:
    app.kubernetes.io/name: apache-flink
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: flink-workload
  namespace: flink
  labels:
    app.kubernetes.io/name: apache-flink
rules:
  - apiGroups:
      - ""
    resources:
      - pods
      - configmaps
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - ""
    resources:
      - services
    verbs:
      - get
      - list
      - watch
      - create
      - delete
  - apiGroups:
      - apps
    resources:
      - deployments
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: flink-workload
  namespace: flink
  labels:
    app.kubernetes.io/name: apache-flink
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: flink-workload
subjects:
  - kind: ServiceAccount
    name: flink
    namespace: flink
