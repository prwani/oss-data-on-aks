apiVersion: v1
kind: Namespace
metadata:
  name: opensearch
  labels:
    app.kubernetes.io/part-of: opensearch-on-aks
    # The checked-in Helm values enable the chart's privileged sysctl init
    # container so vm.max_map_count is set consistently across AKS node images.
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/warn: privileged
