clusterName: "opensearch"
nodeGroup: "manager"
masterService: "opensearch-manager"

roles:
  - master

replicas: 3

extraEnvs:
  - name: OPENSEARCH_INITIAL_ADMIN_PASSWORD
    valueFrom:
      secretKeyRef:
        name: opensearch-admin-credentials
        key: password

config:
  opensearch.yml: |
    cluster.name: opensearch
    network.host: 0.0.0.0
    azure.client.default.token_credential_type: managed_identity

labels:
  azure.workload.identity/use: "true"

rbac:
  create: true
  # Inject the managed identity client ID at install time with:
  # --set-string rbac.serviceAccountAnnotations.azure\\.workload\\.identity/client-id=<client-id>
  serviceAccountName: "opensearch-manager-snapshots"
  automountServiceAccountToken: true

plugins:
  enabled: true
  installList:
    - repository-azure

opensearchJavaOpts: "-Xms1g -Xmx1g"

resources:
  requests:
    cpu: "500m"
    memory: "2Gi"
  limits:
    cpu: "1000m"
    memory: "2Gi"

persistence:
  enabled: true
  storageClass: "managed-csi-premium"
  size: 16Gi

antiAffinityTopologyKey: "kubernetes.io/hostname"
antiAffinity: "hard"

nodeSelector:
  agentpool: osmgr

tolerations:
  - key: "dedicated"
    operator: "Equal"
    value: "opensearch-manager"
    effect: "NoSchedule"

sysctlInit:
  # Enable the chart's privileged init container so vm.max_map_count is
  # configured consistently across AKS node images.
  enabled: true

service:
  type: ClusterIP
  annotations: {}

maxUnavailable: 1
