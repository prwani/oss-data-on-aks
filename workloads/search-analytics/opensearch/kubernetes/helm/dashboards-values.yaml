opensearchHosts: "https://opensearch-manager:9200"
# The shared AKS baseline starts with one schedulable system node, so keep the
# default Dashboards footprint at one replica unless you also scale that pool.
replicaCount: 1

opensearchAccount:
  secret: "opensearch-dashboards-auth"

config:
  opensearch_dashboards.yml: |
    server.host: 0.0.0.0
    opensearch.ssl.verificationMode: none

resources:
  requests:
    cpu: "250m"
    memory: "1Gi"
  limits:
    cpu: "500m"
    memory: "1Gi"

service:
  type: LoadBalancer
  annotations:
    service.beta.kubernetes.io/azure-load-balancer-internal: "true"

topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: opensearch-dashboards
