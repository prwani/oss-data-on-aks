apiVersion: v1
kind: Namespace
metadata:
  name: store-search
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: store-search
  namespace: store-search
  labels:
    app.kubernetes.io/name: store-search
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: store-search
  template:
    metadata:
      labels:
        app.kubernetes.io/name: store-search
    spec:
      containers:
        - name: store-search
          image: <acr-name>.azurecr.io/store-search:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: OPENSEARCH_URL
              value: https://opensearch-manager.opensearch.svc.cluster.local:9200
            - name: OPENSEARCH_INDEX
              value: store-products
            - name: OPENSEARCH_USERNAME
              valueFrom:
                secretKeyRef:
                  name: store-search-opensearch
                  key: username
            - name: OPENSEARCH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: store-search-opensearch
                  key: password
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: store-search
  namespace: store-search
  labels:
    app.kubernetes.io/name: store-search
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: store-search
  ports:
    - name: http
      port: 80
      targetPort: http
