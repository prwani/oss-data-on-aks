image:
  tag: 25.7.5-debian-12-r0

clusterName: aks-clickhouse

shards: 2
replicaCount: 2

auth:
  username: default
  existingSecret: clickhouse-auth
  existingSecretKey: admin-password

service:
  type: ClusterIP
  annotations: {}
  perReplicaAccess: false

exposeMysql: false
exposePostgresql: false

resources:
  requests:
    cpu: "1000m"
    memory: "4Gi"
  limits:
    cpu: "4000m"
    memory: "8Gi"

nodeSelector:
  agentpool: clickhouse

tolerations:
  - key: "dedicated"
    operator: "Equal"
    value: "clickhouse"
    effect: "NoSchedule"

topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/instance: clickhouse
        app.kubernetes.io/component: clickhouse

podAntiAffinityPreset: soft
podManagementPolicy: Parallel

persistence:
  enabled: true
  storageClass: managed-csi-premium
  accessModes:
    - ReadWriteOnce
  size: 128Gi

pdb:
  create: true
  maxUnavailable: 1

metrics:
  enabled: true
  serviceMonitor:
    enabled: false

keeper:
  enabled: true
  replicaCount: 3
  image:
    tag: 25.7.5-debian-12-r0
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"
  nodeSelector:
    agentpool: clickhouse
  tolerations:
    - key: "dedicated"
      operator: "Equal"
      value: "clickhouse"
      effect: "NoSchedule"
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          app.kubernetes.io/instance: clickhouse
          app.kubernetes.io/component: keeper
  persistence:
    enabled: true
    storageClass: managed-csi-premium
    accessModes:
      - ReadWriteOnce
    size: 16Gi
  pdb:
    create: true
    maxUnavailable: 1
