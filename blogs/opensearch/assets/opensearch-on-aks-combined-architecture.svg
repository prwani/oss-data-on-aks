<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1080" viewBox="0 0 1600 1080" role="img" aria-labelledby="title desc">
  <title id="title">OpenSearch logical architecture mapped to AKS</title>
  <desc id="desc">A combined diagram showing OpenSearch manager and data roles, shard replicas, and how those roles map to dedicated AKS node pools, StatefulSets, PVCs, and Azure Disk storage.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 24; ry: 24; }
      .header { font: 700 30px Arial, sans-serif; fill: #0f172a; }
      .sub { font: 600 18px Arial, sans-serif; fill: #334155; }
      .body { font: 500 18px Arial, sans-serif; fill: #1e293b; }
      .small { font: 500 16px Arial, sans-serif; fill: #475569; }
      .tiny { font: 500 14px Arial, sans-serif; fill: #64748b; }
      .manager { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; rx: 18; ry: 18; }
      .data { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; rx: 18; ry: 18; }
      .dash { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 18; ry: 18; }
      .infra { fill: #ede9fe; stroke: #7c3aed; stroke-width: 2; rx: 18; ry: 18; }
      .storage { fill: #fee2e2; stroke: #dc2626; stroke-width: 2; rx: 14; ry: 14; }
      .note { fill: #ecfeff; stroke: #0891b2; stroke-width: 2; rx: 18; ry: 18; }
      .line { stroke: #475569; stroke-width: 3; fill: none; }
      .arrow { stroke: #475569; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .dashed { stroke-dasharray: 10 8; }
      .legend { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 14; ry: 14; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#475569" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="1080" />
  <text class="header" x="800" y="56" text-anchor="middle">OpenSearch logical architecture mapped to AKS</text>
  <text class="small" x="800" y="86" text-anchor="middle">Why this workload behaves differently from a typical stateless microservice on Azure Kubernetes Service</text>

  <rect class="panel" x="50" y="120" width="650" height="820" />
  <text class="header" x="375" y="165" text-anchor="middle">1. OpenSearch logical cluster</text>
  <text class="small" x="375" y="195" text-anchor="middle">Managers coordinate cluster state. Data nodes hold primary and replica shards.</text>

  <rect class="manager" x="100" y="230" width="500" height="110" />
  <text class="sub" x="350" y="270" text-anchor="middle">Cluster-manager nodes</text>
  <text class="body" x="350" y="300" text-anchor="middle">manager-0   manager-1   manager-2</text>
  <text class="small" x="350" y="326" text-anchor="middle">Election quorum, cluster metadata, shard allocation decisions</text>

  <rect class="data" x="90" y="395" width="160" height="210" />
  <text class="sub" x="170" y="430" text-anchor="middle">Data node A</text>
  <rect class="storage" x="115" y="455" width="110" height="44" />
  <text class="body" x="170" y="483" text-anchor="middle">Primary S1</text>
  <rect class="storage" x="115" y="515" width="110" height="44" />
  <text class="body" x="170" y="543" text-anchor="middle">Replica S2</text>
  <rect class="storage" x="115" y="575" width="110" height="44" />
  <text class="body" x="170" y="603" text-anchor="middle">Replica S3</text>

  <rect class="data" x="270" y="395" width="160" height="210" />
  <text class="sub" x="350" y="430" text-anchor="middle">Data node B</text>
  <rect class="storage" x="295" y="455" width="110" height="44" />
  <text class="body" x="350" y="483" text-anchor="middle">Replica S1</text>
  <rect class="storage" x="295" y="515" width="110" height="44" />
  <text class="body" x="350" y="543" text-anchor="middle">Primary S2</text>
  <rect class="storage" x="295" y="575" width="110" height="44" />
  <text class="body" x="350" y="603" text-anchor="middle">Replica S4</text>

  <rect class="data" x="450" y="395" width="160" height="210" />
  <text class="sub" x="530" y="430" text-anchor="middle">Data node C</text>
  <rect class="storage" x="475" y="455" width="110" height="44" />
  <text class="body" x="530" y="483" text-anchor="middle">Replica S1</text>
  <rect class="storage" x="475" y="515" width="110" height="44" />
  <text class="body" x="530" y="543" text-anchor="middle">Replica S2</text>
  <rect class="storage" x="475" y="575" width="110" height="44" />
  <text class="body" x="530" y="603" text-anchor="middle">Primary S3</text>

  <rect class="note" x="95" y="660" width="510" height="130" />
  <text class="sub" x="350" y="700" text-anchor="middle">Why PVCs matter</text>
  <text class="body" x="120" y="735">- Each manager pod needs its own durable disk for cluster metadata.</text>
  <text class="body" x="120" y="765">- Each data pod needs its own durable disk for primary and replica shards.</text>
  <text class="body" x="120" y="795">- If a PVC is not Bound, the corresponding StatefulSet pod stays Pending.</text>

  <rect class="legend" x="110" y="820" width="480" height="86" />
  <text class="small" x="145" y="855">Blue = manager role</text>
  <text class="small" x="300" y="855">Green = data role</text>
  <text class="small" x="440" y="855">Red = per-pod persistent disk</text>
  <text class="tiny" x="350" y="885" text-anchor="middle">Shard layout is illustrative. Real clusters spread primaries and replicas across more indices and nodes.</text>

  <rect class="panel" x="750" y="120" width="800" height="820" />
  <text class="header" x="1150" y="165" text-anchor="middle">2. AKS deployment mapping</text>
  <text class="small" x="1150" y="195" text-anchor="middle">Dedicated node pools, StatefulSets, PVC-backed Azure Disks, and internal-only operator access</text>

  <rect class="infra" x="790" y="230" width="720" height="90" />
  <text class="sub" x="1150" y="268" text-anchor="middle">AKS AVM baseline</text>
  <text class="body" x="1150" y="296" text-anchor="middle">System pool + dedicated osmgr and osdata pools, Azure Disk CSI, internal networking, managed identity</text>

  <rect class="dash" x="820" y="365" width="210" height="160" />
  <text class="sub" x="925" y="400" text-anchor="middle">systempool</text>
  <text class="body" x="925" y="430" text-anchor="middle">opensearch-dashboards</text>
  <text class="body" x="925" y="456" text-anchor="middle">Deployment (2 replicas)</text>
  <text class="small" x="925" y="490" text-anchor="middle">Internal Azure LoadBalancer</text>

  <rect class="manager" x="1060" y="345" width="220" height="370" />
  <text class="sub" x="1170" y="382" text-anchor="middle">osmgr node pool</text>
  <text class="body" x="1170" y="412" text-anchor="middle">StatefulSet: opensearch-manager</text>
  <rect class="storage" x="1090" y="445" width="160" height="52" />
  <text class="body" x="1170" y="477" text-anchor="middle">manager-0 + PVC</text>
  <rect class="storage" x="1090" y="515" width="160" height="52" />
  <text class="body" x="1170" y="547" text-anchor="middle">manager-1 + PVC</text>
  <rect class="storage" x="1090" y="585" width="160" height="52" />
  <text class="body" x="1170" y="617" text-anchor="middle">manager-2 + PVC</text>
  <text class="small" x="1170" y="675" text-anchor="middle">16 GiB Premium SSD-backed Azure Disk</text>

  <rect class="data" x="1300" y="345" width="220" height="420" />
  <text class="sub" x="1410" y="382" text-anchor="middle">osdata node pool</text>
  <text class="body" x="1410" y="412" text-anchor="middle">StatefulSet: opensearch-data</text>
  <rect class="storage" x="1330" y="445" width="160" height="52" />
  <text class="body" x="1410" y="477" text-anchor="middle">data-0 + PVC</text>
  <rect class="storage" x="1330" y="515" width="160" height="52" />
  <text class="body" x="1410" y="547" text-anchor="middle">data-1 + PVC</text>
  <rect class="storage" x="1330" y="585" width="160" height="52" />
  <text class="body" x="1410" y="617" text-anchor="middle">data-2 + PVC</text>
  <text class="small" x="1410" y="675" text-anchor="middle">128 GiB Premium SSD-backed Azure Disk</text>
  <text class="small" x="1410" y="705" text-anchor="middle">Primary and replica shards stay on different pods</text>

  <rect class="note" x="830" y="805" width="670" height="96" />
  <text class="body" x="860" y="845">Operational checks that matter here more than in a typical stateless microservice deployment:</text>
  <text class="body" x="860" y="875">Pods Running + PVCs Bound + internal service wiring + cluster health green</text>

  <path class="arrow" d="M600 285 C710 285, 740 285, 790 285" />
  <path class="arrow dashed" d="M350 610 C680 610, 760 510, 1060 510" />
  <path class="arrow dashed" d="M350 610 C760 610, 860 560, 1300 560" />
  <path class="arrow" d="M1030 445 C1060 445, 1060 445, 1060 445" />
  <path class="arrow" d="M1030 490 C1080 490, 1080 490, 1088 490" />
  <path class="arrow" d="M1030 520 C1080 520, 1080 520, 1088 520" />
  <path class="arrow" d="M1030 550 C1080 550, 1080 550, 1088 550" />

  <text class="tiny" x="800" y="1018" text-anchor="middle">Custom AKS mapping diagram for this repository. OpenSearch cluster concepts are based on OpenSearch documentation diagrams referenced in the workload README and blog.</text>
</svg>
