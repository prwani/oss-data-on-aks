<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1080" viewBox="0 0 1600 1080" role="img" aria-labelledby="title desc">
  <title id="title">OpenSearch logical architecture mapped to AKS</title>
  <desc id="desc">A combined diagram showing OpenSearch manager and data roles mapped to AKS node pools, StatefulSets, persistent volumes, internal Dashboards access, and Azure Blob snapshots through workload identity.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 24; ry: 24; }
      .header { font: 700 30px Arial, sans-serif; fill: #0f172a; }
      .sub { font: 700 18px Arial, sans-serif; fill: #334155; }
      .body { font: 500 17px Arial, sans-serif; fill: #1e293b; }
      .small { font: 500 15px Arial, sans-serif; fill: #475569; }
      .tiny { font: 500 13px Arial, sans-serif; fill: #64748b; }
      .manager { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; rx: 18; ry: 18; }
      .data { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; rx: 18; ry: 18; }
      .dash { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 18; ry: 18; }
      .infra { fill: #ede9fe; stroke: #7c3aed; stroke-width: 2; rx: 18; ry: 18; }
      .storage { fill: #fee2e2; stroke: #dc2626; stroke-width: 2; rx: 14; ry: 14; }
      .snapshot { fill: #e0f2fe; stroke: #0284c7; stroke-width: 2; rx: 18; ry: 18; }
      .note { fill: #ecfeff; stroke: #0891b2; stroke-width: 2; rx: 18; ry: 18; }
      .legend { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 14; ry: 14; }
      .arrow { stroke: #475569; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .dashed { stroke-dasharray: 10 8; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#475569" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="1080" />
  <text class="header" x="800" y="56" text-anchor="middle">OpenSearch logical architecture mapped to AKS</text>
  <text class="small" x="800" y="86" text-anchor="middle">Stateful OpenSearch roles, AKS node pools, durable disks, private access, and keyless snapshots</text>

  <rect class="panel" x="50" y="120" width="650" height="820" />
  <text class="header" x="375" y="165" text-anchor="middle">1. OpenSearch logical cluster</text>
  <text class="small" x="375" y="195" text-anchor="middle">Managers coordinate cluster state. Data nodes hold primary and replica shards.</text>

  <rect class="manager" x="100" y="230" width="500" height="110" />
  <text class="sub" x="350" y="268" text-anchor="middle">Cluster-manager nodes</text>
  <text class="body" x="350" y="298" text-anchor="middle">manager-0  |  manager-1  |  manager-2</text>
  <text class="small" x="350" y="325" text-anchor="middle">Election quorum, metadata, shard allocation, and cluster coordination</text>

  <rect class="data" x="90" y="390" width="160" height="220" />
  <text class="sub" x="170" y="427" text-anchor="middle">Data node A</text>
  <rect class="storage" x="115" y="458" width="110" height="42" />
  <text class="body" x="170" y="485" text-anchor="middle">Primary S1</text>
  <rect class="storage" x="115" y="518" width="110" height="42" />
  <text class="body" x="170" y="545" text-anchor="middle">Replica S2</text>
  <rect class="storage" x="115" y="578" width="110" height="42" />
  <text class="body" x="170" y="605" text-anchor="middle">Replica S3</text>

  <rect class="data" x="270" y="390" width="160" height="220" />
  <text class="sub" x="350" y="427" text-anchor="middle">Data node B</text>
  <rect class="storage" x="295" y="458" width="110" height="42" />
  <text class="body" x="350" y="485" text-anchor="middle">Replica S1</text>
  <rect class="storage" x="295" y="518" width="110" height="42" />
  <text class="body" x="350" y="545" text-anchor="middle">Primary S2</text>
  <rect class="storage" x="295" y="578" width="110" height="42" />
  <text class="body" x="350" y="605" text-anchor="middle">Replica S4</text>

  <rect class="data" x="450" y="390" width="160" height="220" />
  <text class="sub" x="530" y="427" text-anchor="middle">Data node C</text>
  <rect class="storage" x="475" y="458" width="110" height="42" />
  <text class="body" x="530" y="485" text-anchor="middle">Replica S1</text>
  <rect class="storage" x="475" y="518" width="110" height="42" />
  <text class="body" x="530" y="545" text-anchor="middle">Replica S2</text>
  <rect class="storage" x="475" y="578" width="110" height="42" />
  <text class="body" x="530" y="605" text-anchor="middle">Primary S3</text>

  <rect class="note" x="95" y="655" width="510" height="145" />
  <text class="sub" x="350" y="702" text-anchor="middle">Why PVCs matter</text>
  <text class="body" x="125" y="733">- Manager pods keep durable cluster metadata.</text>
  <text class="body" x="125" y="760">- Data pods keep primary and replica shard data.</text>
  <text class="body" x="125" y="787">- Unbound PVCs keep StatefulSet pods Pending.</text>

  <rect class="legend" x="110" y="830" width="480" height="76" />
  <text class="small" x="145" y="863">Blue = manager role</text>
  <text class="small" x="300" y="863">Green = data role</text>
  <text class="small" x="440" y="863">Red = per-pod disk</text>
  <text class="tiny" x="350" y="889" text-anchor="middle">Shard layout is illustrative; OpenSearch balances shards across many indices and nodes.</text>

  <rect class="panel" x="750" y="120" width="800" height="820" />
  <text class="header" x="1150" y="165" text-anchor="middle">2. AKS deployment mapping</text>
  <text class="small" x="1150" y="195" text-anchor="middle">Validated blueprint: dedicated pools, StatefulSets, Azure Disks, internal Dashboards, and Blob snapshots</text>

  <rect class="infra" x="790" y="230" width="720" height="96" />
  <text class="sub" x="1150" y="262" text-anchor="middle">AKS AVM baseline</text>
  <text class="body" x="1150" y="292" text-anchor="middle">systempool + osmgr + osdata, Azure Disk CSI, OIDC issuer, workload identity</text>
  <text class="small" x="1150" y="316" text-anchor="middle">OpenSearch API remains ClusterIP; Dashboards uses an internal Azure Load Balancer</text>

  <rect class="dash" x="800" y="370" width="220" height="170" />
  <text class="sub" x="910" y="404" text-anchor="middle">systempool</text>
  <text class="body" x="910" y="434" text-anchor="middle">OpenSearch Dashboards</text>
  <text class="body" x="910" y="462" text-anchor="middle">Deployment: 1 replica</text>
  <text class="small" x="910" y="497" text-anchor="middle">Service type LoadBalancer</text>
  <text class="small" x="910" y="520" text-anchor="middle">internal private IP only</text>

  <rect class="manager" x="1060" y="370" width="210" height="330" />
  <text class="sub" x="1165" y="404" text-anchor="middle">osmgr node pool</text>
  <text class="body" x="1165" y="434" text-anchor="middle">StatefulSet</text>
  <text class="small" x="1165" y="458" text-anchor="middle">opensearch-manager</text>
  <rect class="storage" x="1088" y="488" width="154" height="44" />
  <text class="body" x="1165" y="516" text-anchor="middle">manager-0 + PVC</text>
  <rect class="storage" x="1088" y="548" width="154" height="44" />
  <text class="body" x="1165" y="576" text-anchor="middle">manager-1 + PVC</text>
  <rect class="storage" x="1088" y="608" width="154" height="44" />
  <text class="body" x="1165" y="636" text-anchor="middle">manager-2 + PVC</text>
  <text class="small" x="1165" y="675" text-anchor="middle">16 GiB Premium SSD</text>

  <rect class="data" x="1300" y="370" width="210" height="330" />
  <text class="sub" x="1405" y="404" text-anchor="middle">osdata node pool</text>
  <text class="body" x="1405" y="434" text-anchor="middle">StatefulSet</text>
  <text class="small" x="1405" y="458" text-anchor="middle">opensearch-data</text>
  <rect class="storage" x="1328" y="488" width="154" height="44" />
  <text class="body" x="1405" y="516" text-anchor="middle">data-0 + PVC</text>
  <rect class="storage" x="1328" y="548" width="154" height="44" />
  <text class="body" x="1405" y="576" text-anchor="middle">data-1 + PVC</text>
  <rect class="storage" x="1328" y="608" width="154" height="44" />
  <text class="body" x="1405" y="636" text-anchor="middle">data-2 + PVC</text>
  <text class="small" x="1405" y="675" text-anchor="middle">128 GiB Premium SSD</text>

  <rect class="snapshot" x="820" y="740" width="690" height="105" />
  <text class="sub" x="1165" y="775" text-anchor="middle">Keyless snapshots to Azure Blob Storage</text>
  <text class="body" x="1165" y="805" text-anchor="middle">User-assigned managed identity + federated credentials for manager/data service accounts</text>
  <text class="small" x="1165" y="832" text-anchor="middle">repository-azure plugin uses workload identity; no storage account key or SAS token</text>

  <rect class="note" x="820" y="875" width="690" height="52" />
  <text class="body" x="1165" y="897" text-anchor="middle">Validate: pods Ready + PVCs Bound + internal service</text>
  <text class="body" x="1165" y="918" text-anchor="middle">cluster health green + snapshot repository verify</text>

  <path class="arrow" d="M600 285 C690 285, 720 285, 790 278" />
  <path class="arrow" d="M1020 455 C1040 455, 1042 455, 1060 455" />
  <path class="arrow" d="M1270 535 C1285 535, 1288 535, 1300 535" />
  <path class="arrow dashed" d="M1165 700 C1165 715, 1165 725, 1165 740" />
  <path class="arrow dashed" d="M1405 700 C1405 725, 1330 735, 1280 740" />

  <text class="tiny" x="800" y="1018" text-anchor="middle">Custom AKS mapping for this repository. OpenSearch cluster concepts are based on OpenSearch documentation diagrams referenced in the workload README and blog.</text>
</svg>
